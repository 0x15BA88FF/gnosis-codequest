services:
  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  createbuckets:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/gnosis --ignore-existing &&
        echo 'Bucket created successfully'
      "

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: gnosis
      POSTGRES_USER: gnosis
      POSTGRES_PASSWORD: gnosis
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gnosis"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: apps/api/
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gnosis
      DB_USERNAME: gnosis
      DB_PASSWORD: gnosis
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081,http://127.0.0.1:8081,http://localhost:19006}
      R2_ENDPOINT: ${R2_ENDPOINT:-http://minio:9000}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-minioadmin}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-minioadmin}
      R2_BUCKET: ${R2_BUCKET:-gnosis}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://mcp:9001}
      RESEND_API_KEY: ${RESEND_API_KEY}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY}
      PAYSTACK_WEBHOOK_SECRET: ${PAYSTACK_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  mcp:
    image: gnosis-mcp:latest
    build:
      context: .
      dockerfile: apps/mcp/Dockerfile
    ports:
      - "9001:9001"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    profiles:
      - mcp
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
